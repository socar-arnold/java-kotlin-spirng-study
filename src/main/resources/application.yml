spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

jpa:
  hibernate:
    ddl-auto: create-drop #앱 시작 시 테이블 자동 생성, 종료 시 삭제
  show-sql: true   # ⭐ JPA가 만드는 SQL 콘솔에 찍기 (학습에 필수!)
  properties:
    hibernate:
      format_sql: true # SQL 예쁘게

logging:                              # ← 추가
  level:
    org.hibernate.SQL: DEBUG          # SQL 본문 (이게 show-sql과 같은 효과)
    org.hibernate.orm.jdbc.bind: TRACE   # ⭐ 파라미터 값(?에 들어간 실제 값)까지